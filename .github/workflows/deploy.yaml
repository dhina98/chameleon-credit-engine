name : Chameleon Credit Engine CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [transaction-service,
                  reward-service,
                  categorization-service,
                  card-engine-service,
                  notification-service,
                  credit-history-service,
                  api-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant gradle execute permission
        working-directory: backend/${{matrix.service}}
        run: chmod +x gradlew

      - name: Build Jar with Gradle
        working-directory: backend/${{matrix.service}}
        run: chmod gradlew bootJar -x test

      - uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build and Push Docker Image
        working-directory: backend/${{matrix.service}}
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/chameleon-${{matrix.service}}:latest .
          docker push ${{secrets.DOCKER_USERNAME}}/chemeleon-${{matrix.service}}:latest
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'ref/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          source: "docker-compose-prod.yaml, init-db.sql"
          target: /home/ubuntu/chameleon

      - name: Deploy to EC2
        uses: appleboy/ssh-action@1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2.SSH_KEY}}
          script: |
            cd /home/ubuntu/chameleon
            echo ${{secrets.DOCKER_PASSWORD}} | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin
            docker-compose -f docker-compose-prod.yaml pull
            docker-compose -f docker-compose-prod.yaml down
            docker-compose -f docker-compose-prod.yaml up -d
            docker system prune -f
            echo Deployment completed successfully!
            

